name: 部署到GitHub Pages

on:
    push:
        branches: [ "main" ]
        
jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
            
        steps:
          - name: 检出代码
            uses: actions/checkout@v4
            
          - name: 配置Pages
            uses: actions/configure-pages@v4
            
          - name: 上传构建产物
            uses: actions/upload-pages-artifact@v3
            with:
              path: '.'
              
          - name: 部署到 GitHub Pages
            uses: actions/deploy-pages@v4